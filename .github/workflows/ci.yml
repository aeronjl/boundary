name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run CI checks
        run: bun run ci
        env:
          ADMIN_TOKEN: ci-admin-token
          CI: true

      - name: Upload policy scenario export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-scenario-export-${{ github.run_id }}
          path: artifacts/policy-scenario-export.json
          if-no-files-found: ignore
